code: formally-bmad
name: "Formally BMAD"
description: "Extends BMad artifacts with formal specifications, ontologies, traceability, readiness checks, verification reports, and an optional parallel DSL branch."
module_version: 1.0.0
default_selected: false
module_greeting: >
  Formally BMAD is configured. Start with setup validation, then choose either the original formal branch (formal import / formal brainstorming) or the parallel DSL branch (DSL brainstorming) to begin building the evolving canonical model.

agents:
  - code: formally-bmad-agent-steward
    name: ""
    title: Canonical Model Steward
    icon: "§"
    description: Maintains Formally BMAD canonical model consistency, provenance, status, and validation.

variables:
  - key: formally_bmad_project_root
    prompt: "Where should Formally BMAD store its project-level formal model and reports?"
    default: "{project-root}/_bmad/formally-bmad"
    result_template: "{answer}"
    user_setting: true
    directories:
      - "{answer}"
  - key: formally_bmad_canonical_model_path
    prompt: "Where should the logic-native canonical model live?"
    default: "{project-root}/_bmad/formally-bmad/canonical"
    result_template: "{answer}"
    user_setting: true
    directories:
      - "{answer}"
  - key: formally_bmad_validation_strictness
    prompt: "What default validation strictness should be used?"
    type: single-select
    default: "stage-aware"
    options:
      - value: "stage-aware"
        label: "Stage-aware"
      - value: "strict"
        label: "Strict"
    result_template: "{answer}"
    user_setting: true
  - key: formally_bmad_auto_apply_repairs
    prompt: "Should accepted repair proposals edit BMad source artifacts directly?"
    type: single-select
    default: "confirm-before-edit"
    options:
      - value: "confirm-before-edit"
        label: "Confirm before edit"
      - value: "proposal-only"
        label: "Proposal only"
    result_template: "{answer}"
    user_setting: true
  - key: formally_bmad_tool_profile
    prompt: "Which automated reasoning tool profile should be used?"
    default: "auto-detect"
    result_template: "{answer}"
    user_setting: true
  - key: formally_bmad_min_required_tools
    prompt: "What is the minimum total number of supported formal tools to require after the baseline validation gate is satisfied?"
    default: "1"
    regex: "^[1-9][0-9]*$"
    result_template: "{answer}"
    user_setting: true
  - key: formally_bmad_export_only_fallback
    prompt: "If an optional reasoning backend is missing after at least one supported tool is available, should those checks degrade to export-only?"
    type: confirm
    default: true
    result_template: "{answer}"
    user_setting: true
  - key: formally_bmad_report_format
    prompt: "Which report formats should verification and readiness reports produce?"
    default: "markdown,html"
    result_template: "{answer}"
    user_setting: true

post-install-notes: >
  Setup requires the baseline validation gate: at least one supported SMT solver and at least one supported first-order or SAT solver. Proof assistants and other tool families are relevant, but they do not replace that baseline. Missing optional backends may degrade individual checks, and installs without the baseline gate are blocked.
